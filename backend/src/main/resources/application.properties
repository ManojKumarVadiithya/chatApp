# Application Configuration
spring.application.name=mm-chat-backend
server.port=${PORT:8080}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI}

# JWT Configuration
# Secret key for HS512 (must be >= 512 bits / 64 bytes for security)
# Use Base64 encoded value for better security
jwt.secret=${JWT_SECRET}
# Session expiration: 24 hours = 86400000 milliseconds
jwt.expiration=86400000
jwt.refresh-expiration=2592000000

# Logging Configuration
logging.level.root=INFO
logging.level.com.mmchat=DEBUG

# Server Configuration
server.compression.enabled=true
server.compression.min-response-size=1024

# Jackson Configuration (JSON serialization)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
